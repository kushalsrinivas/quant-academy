<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quant Academy — App Store Screenshots</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-display: "Space Grotesk", sans-serif;
        --font-body: "Inter", -apple-system, sans-serif;
        --color-ink: #ffffff;
        --color-ink-muted: rgba(255, 255, 255, 0.72);
        --color-glass: rgba(255, 255, 255, 0.06);
        --color-glass-border: rgba(255, 255, 255, 0.12);
        --radius-card: 28px;
        --radius-pill: 100px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-body);
        background: #050508;
        color: #fff;
        min-height: 100vh;
      }

      .controls {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(5, 5, 8, 0.92);
        backdrop-filter: blur(24px) saturate(1.4);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 14px 28px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .controls h1 {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.02em;
        flex: 1;
        opacity: 0.9;
      }
      .btn {
        padding: 10px 22px;
        border-radius: 10px;
        border: none;
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: #fff;
        box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .progress-bar {
        display: none;
        width: 180px;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar.active {
        display: block;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      .status {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 500;
      }

      .content {
        padding-top: 90px;
        padding-bottom: 80px;
      }
      .section-title {
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        padding: 48px 28px 24px;
        color: rgba(255, 255, 255, 0.9);
      }
      .section-title span {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.35);
        margin-left: 10px;
        letter-spacing: 0;
      }
      .screenshots-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 0 28px;
        justify-content: flex-start;
      }
      .screenshot-wrapper {
        position: relative;
      }
      .screenshot-label {
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 10px;
      }

      .iphone-frame {
        width: 270px;
        height: 584px;
        border-radius: 36px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .ipad-frame {
        width: 340px;
        height: 453px;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .render-target {
        position: absolute;
        left: -99999px;
        top: 0;
      }
      .iphone-render {
        width: 1284px;
        height: 2778px;
      }
      .ipad-render {
        width: 2048px;
        height: 2732px;
      }

      /* ═══ SCREENSHOT CARD BASE ═══ */
      .ss-card {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        font-family: var(--font-body);
      }
      .ss-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 3;
      }

      /* ─── Backgrounds ─── */
      .ss-1 {
        background: #030712;
        background-image:
          radial-gradient(
            ellipse 140% 70% at 50% 85%,
            rgba(59, 130, 246, 0.3) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 80% 50% at 20% 20%,
            rgba(99, 102, 241, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 50%,
            rgba(59, 130, 246, 0.08) 0%,
            transparent 50%
          );
      }
      .ss-2 {
        background: #0a0118;
        background-image:
          radial-gradient(
            ellipse 100% 60% at 30% 75%,
            rgba(139, 92, 246, 0.35) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 70% 50% at 80% 30%,
            rgba(236, 72, 153, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 50% 50%,
            rgba(139, 92, 246, 0.06) 0%,
            transparent 50%
          );
      }
      .ss-3 {
        background: #020e0a;
        background-image:
          radial-gradient(
            ellipse 100% 60% at 40% 80%,
            rgba(16, 185, 129, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 20%,
            rgba(20, 184, 166, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 50% at 20% 50%,
            rgba(16, 185, 129, 0.06) 0%,
            transparent 50%
          );
      }
      .ss-4 {
        background: #0c0704;
        background-image:
          radial-gradient(
            ellipse 120% 60% at 60% 80%,
            rgba(245, 158, 11, 0.25) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 50% at 10% 40%,
            rgba(234, 88, 12, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 70% 30%,
            rgba(245, 158, 11, 0.06) 0%,
            transparent 50%
          );
      }
      .ss-5 {
        background: #0c0205;
        background-image:
          radial-gradient(
            ellipse 100% 60% at 50% 75%,
            rgba(239, 68, 68, 0.25) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 50% at 90% 20%,
            rgba(244, 63, 94, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 20% 50%,
            rgba(239, 68, 68, 0.06) 0%,
            transparent 50%
          );
      }
      .ss-6 {
        background: #06040f;
        background-image:
          radial-gradient(
            ellipse 120% 60% at 40% 80%,
            rgba(99, 102, 241, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 60% 50% at 85% 20%,
            rgba(168, 85, 247, 0.12) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 50% 50%,
            rgba(99, 102, 241, 0.06) 0%,
            transparent 50%
          );
      }

      /* ─── Phone mockup image ─── */
      .ss-mockup-area {
        z-index: 2;
        width: 100%;
        flex: 1;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        overflow: hidden;
      }
      .ss-phone-img {
        height: 1900px;
        object-fit: contain;
        border-radius: 56px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      /* ═══ iPhone render sizes ═══ */
      .iphone-render .ss-card {
        padding: 160px 100px 0;
        justify-content: flex-start;
        align-items: center;
        text-align: center;
      }
      .iphone-render .ss-headline {
        font-family: var(--font-display);
        font-size: 128px;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.05;
        color: #fff;
        z-index: 2;
        margin-bottom: 28px;
      }
      .iphone-render .ss-subheadline {
        font-family: var(--font-body);
        font-size: 44px;
        font-weight: 400;
        line-height: 1.5;
        color: var(--color-ink-muted);
        z-index: 2;
        max-width: 1000px;
        margin-bottom: 64px;
      }
      .iphone-render .ss-badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 20px 40px;
        border-radius: var(--radius-pill);
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 48px;
        z-index: 2;
        border: 1px solid var(--color-glass-border);
      }
      .iphone-render .ss-phone-img {
        width: 860px;
      }
      .iphone-render .geo-accent {
        position: absolute;
        z-index: 1;
        border-radius: 50%;
        opacity: 0.04;
        background: #fff;
      }
      .iphone-render .geo-1 {
        width: 600px;
        height: 600px;
        top: -200px;
        right: -200px;
      }
      .iphone-render .geo-2 {
        width: 400px;
        height: 400px;
        bottom: 400px;
        left: -150px;
      }

      /* ═══ iPad render sizes ═══ */
      .ipad-render .ss-card {
        padding: 180px 160px 0;
        justify-content: flex-start;
        align-items: center;
        text-align: center;
      }
      .ipad-render .ss-headline {
        font-family: var(--font-display);
        font-size: 148px;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.05;
        color: #fff;
        z-index: 2;
        margin-bottom: 36px;
      }
      .ipad-render .ss-subheadline {
        font-family: var(--font-body);
        font-size: 52px;
        font-weight: 400;
        line-height: 1.5;
        color: var(--color-ink-muted);
        z-index: 2;
        max-width: 1500px;
        margin-bottom: 72px;
      }
      .ipad-render .ss-badge {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 24px 48px;
        border-radius: var(--radius-pill);
        font-size: 38px;
        font-weight: 600;
        margin-bottom: 56px;
        z-index: 2;
        border: 1px solid var(--color-glass-border);
      }
      .ipad-render .ss-phone-img {
        width: 740px;
      }
      .ipad-render .geo-accent {
        position: absolute;
        z-index: 1;
        border-radius: 50%;
        opacity: 0.04;
        background: #fff;
      }
      .ipad-render .geo-1 {
        width: 800px;
        height: 800px;
        top: -250px;
        right: -250px;
      }
      .ipad-render .geo-2 {
        width: 500px;
        height: 500px;
        bottom: 300px;
        left: -200px;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <h1>Quant Academy — Screenshots</h1>
      <button class="btn btn-primary" onclick="downloadAllAsZip()">
        Download All (.zip)
      </button>
      <button class="btn btn-secondary" onclick="downloadiPhone()">
        iPhone 6.7"
      </button>
      <button class="btn btn-secondary" onclick="downloadiPad()">
        iPad 12.9"
      </button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <span class="status" id="statusText"></span>
    </div>

    <div class="content">
      <h2 class="section-title">iPhone 6.7" <span>1284 × 2778px</span></h2>
      <div class="screenshots-grid" id="iphonePreview"></div>
      <h2 class="section-title">iPad 12.9" <span>2048 × 2732px</span></h2>
      <div class="screenshots-grid" id="ipadPreview"></div>
    </div>

    <div id="renderContainer" class="render-target"></div>

    <script>
      const screenshotData = [
        {
          id: 1,
          headline: "Master\nQuant Trading",
          subheadline:
            "From market basics to advanced strategies.\nThe complete quant finance curriculum.",
          badge: { text: "Quant Academy", bg: "rgba(59,130,246,0.15)" },
          mockupImage: "mockups/01-learn-home.png",
        },
        {
          id: 2,
          headline: "Interactive\nLessons",
          subheadline:
            "Rendered math formulas, interactive code,\nand clear explanations.",
          mockupImage: "mockups/02-lesson-math.png",
        },
        {
          id: 3,
          headline: "Test Your\nKnowledge",
          subheadline:
            "Quizzes after every lesson.\nInstant feedback and explanations.",
          mockupImage: "mockups/03-quiz.png",
        },
        {
          id: 4,
          headline: "Learn by\nDoing",
          subheadline:
            "Strategy builder, order book sim,\nand more hands-on tools.",
          badge: { text: "Sandbox", bg: "rgba(245,158,11,0.15)" },
          mockupImage: "mockups/04-sandbox.png",
        },
        {
          id: 5,
          headline: "Ace the\nInterview",
          subheadline:
            "Practice what HRT, Jane Street,\nand Citadel actually ask.",
          badge: { text: "Interview Prep", bg: "rgba(239,68,68,0.15)" },
          mockupImage: "mockups/05-interview-prep.png",
        },
        {
          id: 6,
          headline: "Track\nProgress",
          subheadline:
            "XP, levels, and achievements.\nStay motivated as you grow.",
          mockupImage: "mockups/06-profile.png",
        },
      ];

      function generateScreenshotHTML(data) {
        let inner = "";

        if (data.badge) {
          inner += `<div class="ss-badge" style="background:${data.badge.bg};color:rgba(255,255,255,0.9);">${data.badge.text}</div>`;
        }

        inner += `<div class="ss-headline">${data.headline.replace(/\n/g, "<br>")}</div>`;
        inner += `<div class="ss-subheadline">${data.subheadline.replace(/\n/g, "<br>")}</div>`;

        inner += `<div class="ss-mockup-area"><img class="ss-phone-img" src="${data.mockupImage}" alt=""></div>`;
        inner += `<div class="geo-accent geo-1"></div><div class="geo-accent geo-2"></div>`;

        return `<div class="ss-card ss-${data.id}">${inner}</div>`;
      }

      function createPreview(container, isIpad) {
        const el = document.getElementById(container);
        const w = isIpad ? 2048 : 1284;
        const h = isIpad ? 2732 : 2778;
        const frameW = isIpad ? 340 : 270;
        const scale = frameW / w;
        screenshotData.forEach((data) => {
          const wrapper = document.createElement("div");
          wrapper.className = "screenshot-wrapper";
          const frame = document.createElement("div");
          frame.className = isIpad ? "ipad-frame" : "iphone-frame";
          const renderDiv = document.createElement("div");
          renderDiv.className = isIpad ? "ipad-render" : "iphone-render";
          renderDiv.innerHTML = generateScreenshotHTML(data);
          renderDiv.style.transform = `scale(${scale})`;
          renderDiv.style.transformOrigin = "top left";
          renderDiv.style.width = w + "px";
          renderDiv.style.height = h + "px";
          frame.appendChild(renderDiv);
          wrapper.appendChild(frame);
          const label = document.createElement("div");
          label.className = "screenshot-label";
          label.textContent = `${data.id}. ${data.headline.replace(/\n/g, " ")}`;
          wrapper.appendChild(label);
          el.appendChild(wrapper);
        });
      }

      async function captureScreenshot(data, isIpad) {
        const w = isIpad ? 2048 : 1284;
        const h = isIpad ? 2732 : 2778;
        const div = document.createElement("div");
        div.className = isIpad ? "ipad-render" : "iphone-render";
        div.innerHTML = generateScreenshotHTML(data);
        div.style.position = "fixed";
        div.style.left = "0";
        div.style.top = "0";
        div.style.zIndex = "-9999";
        document.body.appendChild(div);
        await new Promise((r) => setTimeout(r, 500));
        const canvas = await html2canvas(div, {
          width: w,
          height: h,
          scale: 1,
          useCORS: true,
          backgroundColor: null,
        });
        div.remove();
        return canvas.toDataURL("image/png");
      }

      async function downloadAllAsZip() {
        await generateZip("all");
      }
      async function downloadiPhone() {
        await generateZip("iphone");
      }
      async function downloadiPad() {
        await generateZip("ipad");
      }

      async function generateZip(type) {
        const btns = document.querySelectorAll(".btn");
        btns.forEach((b) => (b.disabled = true));
        const bar = document.getElementById("progressBar");
        const fill = document.getElementById("progressFill");
        const status = document.getElementById("statusText");
        bar.classList.add("active");
        fill.style.width = "0%";
        const zip = new JSZip();
        const iphoneFolder = zip.folder("iPhone_6.7_1284x2778");
        const ipadFolder = zip.folder("iPad_12.9_2048x2732");
        const total =
          type === "all" ? screenshotData.length * 2 : screenshotData.length;
        let done = 0;

        if (type === "all" || type === "iphone") {
          for (const data of screenshotData) {
            status.textContent = `iPhone ${data.id}/${screenshotData.length}`;
            const dataUrl = await captureScreenshot(data, false);
            iphoneFolder.file(
              `${String(data.id).padStart(2, "0")}_${data.headline.replace(/\n/g, "_").replace(/[^a-zA-Z0-9_]/g, "")}.png`,
              dataUrl.split(",")[1],
              { base64: true },
            );
            done++;
            fill.style.width = `${(done / total) * 100}%`;
          }
        }

        if (type === "all" || type === "ipad") {
          for (const data of screenshotData) {
            status.textContent = `iPad ${data.id}/${screenshotData.length}`;
            const dataUrl = await captureScreenshot(data, true);
            ipadFolder.file(
              `${String(data.id).padStart(2, "0")}_${data.headline.replace(/\n/g, "_").replace(/[^a-zA-Z0-9_]/g, "")}.png`,
              dataUrl.split(",")[1],
              { base64: true },
            );
            done++;
            fill.style.width = `${(done / total) * 100}%`;
          }
        }

        status.textContent = "Zipping...";
        const content = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = `QuantAcademy_Screenshots_${type}.zip`;
        a.click();
        URL.revokeObjectURL(a.href);
        status.textContent = "Done";
        fill.style.width = "100%";
        btns.forEach((b) => (b.disabled = false));
        setTimeout(() => {
          bar.classList.remove("active");
          status.textContent = "";
        }, 2500);
      }

      createPreview("iphonePreview", false);
      createPreview("ipadPreview", true);
    </script>
  </body>
</html>
