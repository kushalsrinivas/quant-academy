name: Bug Report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps to reproduce.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - Multiple
    validations:
      required: true
  - type: input
    id: appversion
    attributes:
      label: App version
      placeholder: e.g. 1.0.1
  - type: input
    id: environment
    attributes:
      label: Device / OS
      placeholder: e.g. iPhone 15, iOS 18.0
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs and include screenshots/videos if relevant.
